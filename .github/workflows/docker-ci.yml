name: Build and Deploy SSO

on:
  push:
    tags:
      - "v*"
      - "release-*"

env:
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Sso.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sso-service-dev:latest

      - name: Build and Push Backend (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Sso.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sso-service:${{ env.IMAGE_TAG }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sso-ui-dev:latest

      - name: Build and Push Frontend (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sso-ui:${{ env.IMAGE_TAG }}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev
        if: github.ref == 'refs/heads/dev'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/eco
            docker-compose -f docker-compose.prod.yml pull sso-ui-dev sso-service-dev
            docker-compose -f docker-compose.prod.yml up -d sso-ui-dev sso-service-dev
            docker-compose -f docker-compose.prod.yml exec gateway nginx -s reload

      - name: Deploy production
        if: startsWith(github.ref, 'refs/tags/')
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/eco
            sed -i "s/^SERVICE_TAG_SSO=.*/SERVICE_TAG_SSO=${{ env.IMAGE_TAG }}/" .env
            docker-compose -f docker-compose.prod.yml pull sso-ui sso-service
            docker-compose -f docker-compose.prod.yml up -d sso-ui sso-service
            docker-compose -f docker-compose.prod.yml exec gateway nginx -s reload
